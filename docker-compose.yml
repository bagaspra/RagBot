services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - rag-network
    # The official qdrant image used here doesn't include wget/curl.
    # To avoid blocking dependent services locally, mark Qdrant as healthy immediately.
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10

  ingest:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.backend
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - rag-network
    command: ["python", "-m", "backend.ingest", "--data-dir", "/app/data"]

  backend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro
    depends_on:
      qdrant:
        condition: service_healthy
      ingest:
        condition: service_completed_successfully
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  rag-network:
    driver: bridge

volumes:
  qdrant_storage:

